<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>這是正在開發的app，希望能通過您的審核，我才能進行測試</title>
    <style>
        :root { --accent: #2D5A27; --bg: #F2F2F2; --text: #1B241B; }
        body { font-family: "PingFang TC", sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }
        .hero { background: white; padding: 60px 20px; text-align: center; border-bottom: 1px solid #CFD6CF; }
        .logo { font-size: 3rem; font-weight: 900; color: var(--accent); margin-bottom: 10px; }
        .tagline { font-size: 1.2rem; color: #707970; margin-bottom: 30px; }
        .screenshot { width: 100%; max-width: 300px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid white; }
        .features { max-width: 800px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 0 20px; }
        .feature-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #CFD6CF; text-align: left; }
        .feature-card h3 { color: var(--accent); margin-top: 0; }
        .footer { text-align: center; padding: 40px; color: #707970; font-size: 0.9rem; }
    </style>
</head>
</html>
